<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styleformE.css">
    <script src="scriptformE.js" defer></script>
</head>
<body>
    <h1>Js Forms</h1>
    <br/>
<form action="/">
    <h1>Signup Today!</h1>
    <div class="input-box">
        <label for="input-box" >Username</label>
        <input name="Username" type="text" placeholder="Enter name" id="Username"/>
    </div><br>
    <div class="input-box">
        <label for="email" >Email</label>
        <input name="email" type="email" placeholder="Enter email" id="email"/>
    </div><br>
    <div class="input-box">
        <label for="password" >Password</label>
        <input name="password" type="password" placeholder="Enter password" id="password"/>
    </div><br>
    <div class="input-box">
        <label for="confirm password" >Confirm Password</label>
        <input name="confirm-password" type="password" placeholder="confirm-password" id="confirm-password"/>
    </div><br>
    <button type="submit">Submit</button>
    <div id="form-info">
        <p id="form-msg">Enter all fields</p>
    </div>

</form>    
</body>
</html>
